<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0E1014" />
    <meta name="description" content="SOLID K-NAVIGATOR - 株式ポートフォリオ管理ツール" />
    <link rel="manifest" href="/manifest.json?v=4" />
    <link rel="apple-touch-icon" href="/pwa-icon-192.png?v=4" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=4" />
    <title>SOLID K-NAVIGATOR</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        const swPath = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
          ? '/sw.js'
          : '/-SOLID-K-NAVIGATOR-/sw.js';
        window.addEventListener('load', () => {
          navigator.serviceWorker.register(swPath)
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
